<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MMD Template</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Dela+Gothic+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header class="header">

<div class="logo">

<span class="logo-main">
No's
</span>

<span class="logo-sub">
Archive
</span>

<div class="logo-caption">
漫画・小説・イラスト保管庫
</div>

</div>

<input
class="search"
placeholder="作品検索">

</header>

<div class="layout">

<aside class="sidebar">

<div class="receipt">

<div class="rtitle">
RECEIPT #0001
</div>

<div class="small">
WELCOME
</div>

<div class="line"></div>

<nav class="menu">

<a href="index.html#new">
01 NEW
</a>

<a href="index.html#comic">
02 COMIC
</a>

<a href="index.html#novel">
03 NOVEL
</a>

<a href="illust/archive_room.html">
04 PICT.
</a>

<a href="#">
05 MMD
</a>

<a href="index.html#update">
06 UPDATE
</a>

</nav>

<div class="line"></div>

<div class="sidebar-message">

パン焼けました🍞<br>
ONLY YOU! 公開中

</div>

<img
src="images/common/sidebar_chara.png"
class="chara">

<div class="line"></div>

<div class="social">

<a
href="https://x.com/Lt0pp"
target="_blank">

<img
src="images/common/x-icon.png"
alt="X">

</a>

<a
href="https://wavebox.me/wave/62pbvrjbohkxxidx/"
target="_blank">

<img
src="images/common/wavebox-icon.png"
alt="Wavebox">

</a>

</div>

</div>

</aside>

<main class="main">

<div class="container">

<div class="player" id="player">
<img id="playerImg" src="images/mmd01_s.png">
<div class="play">▶</div>
</div>

<div class="info">

<div class="player-title" id="title">
MMD作品タイトル
</div>

<div class="meta">
<b>曲名：</b><span id="song">DAYBREAK FRONTLINE</span><br>
<b>説明：</b><span id="desc">作品説明が入ります。</span>
</div>

<a id="watchBtn"
class="watch"
href="https://youtube.com/"
target="_blank">
▶ YouTubeで見る
</a>

</div>

<div class="tabs">
<button class="tab active" onclick="showTab('video',this)">動画</button>
<button class="tab" onclick="showTab('shorts',this)">Shorts</button>
</div>

<div id="videoPanel" class="panel">

<div class="grid">

<div class="thumb"
onclick="selectItem(
'images/mmd01_ss01.webp',
'Scene 01',
'お気に入りシーン①',
'https://youtu.be/example?t=15'
)">
<img src="images/mmd01_ss01.webp">
<div>Scene 01</div>
</div>

<div class="thumb"
onclick="selectItem(
'images/mmd01_ss02.webp',
'Scene 02',
'お気に入りシーン②',
'https://youtu.be/example?t=45'
)">
<img src="images/mmd01_ss02.webp">
<div>Scene 02</div>
</div>

<div class="thumb"
onclick="selectItem(
'images/mmd01_ss03.webp',
'Scene 03',
'お気に入りシーン③',
'https://youtu.be/example?t=80'
)">
<img src="images/mmd01_ss03.webp">
<div>Scene 03</div>
</div>

</div>

</div>

<div id="shortPanel" class="panel hidden">

<div class="grid">

<div class="thumb"
onclick="selectItem(
'images/mmd01_short01.png',
'Short #01',
'Shorts動画',
'https://youtube.com/shorts/example1'
)">
<img src="images/mmd01_short01.png">
<div>Short #01</div>
</div>

<div class="thumb"
onclick="selectItem(
'images/mmd01_short02.png',
'Short #02',
'Shorts動画',
'https://youtube.com/shorts/example2'
)">
<img src="images/mmd01_short02.png">
<div>Short #02</div>
</div>

<div class="thumb"
onclick="selectItem(
'images/mmd01_short03.png',
'Short #03',
'Shorts動画',
'https://youtube.com/shorts/example3'
)">
<img src="images/mmd01_short03.png">
<div>Short #03</div>
</div>

</div>

</div>
  
</div>

</main>

</div>

<script>

function selectItem(img,title,desc,url){

document.getElementById('playerImg').src=img;

document.getElementById('song').textContent=title;

document.getElementById('desc').textContent=desc;

document.getElementById('watchBtn').href=url;

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function showTab(name,btn){

document.querySelectorAll('.tab').forEach(
x=>x.classList.remove('active')
);

btn.classList.add('active');

document.getElementById('videoPanel')
.classList.add('hidden');

document.getElementById('shortPanel')
.classList.add('hidden');

if(name==='video'){
document.getElementById('videoPanel')
.classList.remove('hidden');
}else{
document.getElementById('shortPanel')
.classList.remove('hidden');
}

}

</script>

</body>
</html>
