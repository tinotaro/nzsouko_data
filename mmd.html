</div>

<script>

function changeMovie(
img,
title,
desc,
url
){

document.getElementById(
'playerImg'
).src = img;

document.getElementById(
'title'
).textContent = title;

document.getElementById(
'desc'
).textContent = desc;

document.getElementById(
'watchBtn'
).href = url;

document.getElementById(
'playerEmpty'
).style.display = 'none';

}
function showTab(
tab,
btn
){

document
.querySelectorAll('.mmd-tab')
.forEach(
x=>x.classList.remove(
'active'
)
);

btn.classList.add(
'active'
);

document
.getElementById(
'videoPanel'
)
.classList.add(
'hidden'
);

document
.getElementById(
'shortPanel'
)
.classList.add(
'hidden'
);

if(tab==='video'){

document
.getElementById(
'videoPanel'
)
.classList.remove(
'hidden'
);

}else{

document
.getElementById(
'shortPanel'
)
.classList.remove(
'hidden'
);

}

}
</script>
