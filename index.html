<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>No's Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
--purple:#A590AF;
--green:#7BBF8A;
--red:#E53935;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#f5f5f5;color:#222}

/* Header */
.header{
position:fixed;
top:0;left:0;right:0;
height:72px;
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
z-index:1000;
box-shadow:0 14px 28px rgba(0,0,0,.35);
}
.logo{
font-size:32px;
font-weight:800;
color:var(--red);
}
.search{
width:360px;
padding:10px 16px;
border:none;
border-radius:24px;
}

.layout{display:flex;margin-top:72px}

/* Sidebar */
.sidebar{
width:280px;
padding:0 20px 20px;
background:#1a1a1a;
}

/* Receipt */
.receipt{
position:sticky;
top:72px;
background:#fffdf8;
padding:22px;
margin-top:-6px;
box-shadow:0 8px 20px rgba(0,0,0,.18);
z-index:1;
}
.receipt:after{
content:"";
position:absolute;
left:0;
right:0;
bottom:-12px;
height:12px;
background:
linear-gradient(-45deg, transparent 8px, #fffdf8 0) bottom left,
linear-gradient(45deg, transparent 8px, #fffdf8 0) bottom right;
background-size:16px 16px;
background-repeat:repeat-x;
}
.rtitle{
text-align:center;
font-weight:800;
}
.small{
font-size:11px;
text-align:center;
color:#666;
}
.line{
border-top:1px dashed #999;
margin:12px 0;
}
.menu a{
display:block;
text-decoration:none;
color:#222;
padding:8px 0;
font-weight:700;
font-family:monospace;
}
.menu a:hover{color:var(--purple)}
.speech{
background:#f7f7f7;
padding:10px;
border-radius:10px;
font-size:13px;
}
.chara{
width:120px;
display:block;
margin:12px auto;
}
.social{
display:flex;
justify-content:center;
gap:14px;
}
.social img{
width:50px;
height:50px;
object-fit:contain;
}

/* Main */
.main{flex:1;padding:20px}
.hero{
height:420px;
background:#ddd;
border-radius:14px;
overflow:hidden;
}
.hero img{
width:100%;height:100%;object-fit:cover;
}

.section{margin-top:28px}
.section h2{
border-left:5px solid var(--purple);
padding-left:10px;
margin-bottom:14px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:14px;
}
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
text-decoration:none;
color:#222;
box-shadow:0 2px 8px rgba(0,0,0,.08);
transition:.2s;
position:relative;
}
.card:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}
.card img{
width:100%;
height:250px;
object-fit:cover;
}
.new{
position:absolute;
top:8px;
left:8px;
background:var(--purple);
color:#fff;
padding:4px 8px;
border-radius:999px;
font-size:11px;
font-weight:700;
}
.info{padding:10px}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}
.tags span{
background:#f2edf4;
color:#765f80;
padding:3px 8px;
border-radius:999px;
font-size:11px;
}
.page{
display:inline-block;
background:var(--green);
color:#fff;
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
margin-bottom:8px;
}

@media(max-width:900px){
.layout{display:block}
.sidebar{width:100%}
.hero{height:240px}
}
</style>
</head>
<body>

<header class="header">
<div class="logo">No's Archive</div>
<input class="search" placeholder="作品検索（仮）">
</header>

<div class="layout">

<aside class="sidebar">
<div class="receipt">

<div class="rtitle">RECEIPT #0001</div>
<div class="small">2026/05/25</div>

<div class="line"></div>

<nav class="menu">
<a href="#new">01 NEW</a>
<a href="#comic">02 COMIC</a>
<a href="#novel">03 NOVEL</a>
<a href="#illust">04 ILLUSTRATION</a>
<a href="mmd.html">05 MMD</a>
<a href="#update">06 UPDATE</a>
</nav>

<div class="line"></div>

<div class="speech">パン焼けました🍞<br>ONLY YOU! 公開中</div>

<img src="images/sidebar_chara.png" class="chara">

<div class="line"></div>

<div class="social">
<a href="#"><img src="images/x-icon.png"></a>
<a href="#"><img src="images/wavebox-icon.png"></a>
</div>

<div class="line"></div>

<div class="small">
SUBTOTAL 15<br>
TAX 0<br>
TOTAL 15
</div>

</div>
</aside>

<main class="main">
<div class="hero">
<img src="images/comic01_s.png">
</div>

<section id="new" class="section">
<h2>NEW ARRIVALS</h2>
<div class="grid">
<a class="card" href="comic05_p.html">
<span class="new">NEW</span>
<img src="images/comic05_p.png">
<div class="info">
<b>ONLY YOU!</b>
<div class="tags"><span>#恋愛</span><span>#ギャグ</span></div>
<div class="page">52P</div>
<div>恋愛下手な二人の初恋こじらせ話</div>
</div>
</a>
</div>
</section>
</main>

</div>
</body>
</html>
