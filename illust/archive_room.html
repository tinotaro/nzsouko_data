content="noindex,nofollow,noarchive,nosnippet">

content="noindex,nofollow,noarchive">

<link rel="stylesheet"
href="../css/style.css"">

<style>

/* ======================================
   Illust Page
====================================== */

.illust-page{

background:#ece7df;

border-radius:24px;

padding:24px;

min-height:100vh;

}

/* ======================================
   Filter
====================================== */

.filters{

position:sticky;

top:0;

z-index:20;

padding-bottom:20px;

display:flex;

gap:10px;

flex-wrap:wrap;

background:
rgba(236,231,223,.92);

backdrop-filter:
blur(10px);

}

/* ======================================
   Filter Button
====================================== */

.filter{

border:none;

padding:
10px 18px;

border-radius:999px;

background:#fff;

cursor:pointer;

font-weight:bold;

font-size:14px;

transition:.2s;

}

.filter:hover{

background:#b59cb9;
color:#fff;

}

.filter.active{

background:#8f7695;
color:#fff;

}

/* ======================================
   Gallery
====================================== */

.gallery{

column-count:5;

column-gap:18px;

}

/* ======================================
   Card
====================================== */

.card{

position:relative;

display:inline-block;

width:100%;

margin:
0 0 18px;

background:#fffdfa;

padding:
12px
12px
18px;

border-radius:14px;

overflow:hidden;

box-shadow:
0 4px 14px rgba(0,0,0,.12);

break-inside:avoid;

cursor:pointer;

transition:.2s;

}

/* Hover */

.card:hover{

transform:
translateY(-4px);

box-shadow:
0 10px 24px rgba(0,0,0,.16);

}

/* ======================================
   Image
====================================== */

.card img{

width:100%;

height:auto;

display:block;

border-radius:6px;

}


/* ======================================
   Title
====================================== */

.title{

margin-top:10px;

font-weight:bold;

font-size:15px;

}

/* ======================================
   Tags
====================================== */

.tags{

display:flex;

flex-wrap:wrap;

gap:6px;

margin-top:8px;

}

.tags span{

font-size:11px;

padding:
4px 8px;

border-radius:999px;

background:#f3eef5;

color:#6f5978;

}

/* ======================================
   Lightbox
====================================== */

.lightbox{

display:none;

position:fixed;

inset:0;

background:
rgba(0,0,0,.9);

justify-content:center;
align-items:center;

z-index:999;

}

.lightbox img{

max-width:92vw;
max-height:92vh;

border-radius:12px;

}

/* ======================================
   Responsive
====================================== */

@media(max-width:1200px){

.gallery{

column-count:4;

}

}

@media(max-width:900px){

.gallery{

column-count:3;

}

}

@media(max-width:700px){

.gallery{

column-count:2;

}

}

</style>

</head>

====================================== -->

<script>

/* ======================================
   Lightbox
====================================== */

document
.querySelectorAll('.card')
.forEach(card=>{

card.onclick=()=>{

document
.getElementById('viewer')
.src=

card.querySelector('img').src;

document
.getElementById('lightbox')
.style.display='flex';

}

});

document
.getElementById('lightbox')
.onclick=()=>{

document
.getElementById('lightbox')
.style.display='none';

};

</script>
