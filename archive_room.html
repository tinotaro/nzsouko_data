<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Archive Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Dela+Gothic+One&display=swap" rel="stylesheet">
<style>
:root{
--purple:#A590AF;
--green:#7BBF8A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:'M PLUS Rounded 1c',sans-serif;
background:#ece7df;
color:#222;
}
header{
background:#111;
color:#fff;
padding:18px 24px;
}
h1{
font-family:'Dela Gothic One',sans-serif;
font-size:28px;
}
.filters{
position:sticky;
top:0;
z-index:20;
padding:16px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
background:rgba(236,231,223,.95);
backdrop-filter:blur(8px);
}
.filter{
border:none;
padding:10px 18px;
border-radius:999px;
background:#fff;
cursor:pointer;
font-weight:700;
}
.filter.active{
background:var(--purple);
color:#fff;
}
.section{
max-width:1800px;
margin:auto;
padding:20px;
}
details{
margin-bottom:30px;
}
summary{
cursor:pointer;
font-size:22px;
font-weight:700;
padding:8px 0;
}
.gallery{
column-count:5;
column-gap:18px;
}
.card{
position:relative;
display:inline-block;
width:100%;
margin:0 0 18px;
background:#fff;
padding:12px 12px 18px;
border-radius:8px;
box-shadow:0 4px 14px rgba(0,0,0,.12);
break-inside:avoid;
cursor:pointer;
transition:.2s;
}
.card:hover{
transform:translateY(-4px);
}
.card img{
width:100%;
display:block;
border-radius:4px;
}
.pin{
position:absolute;
left:50%;
top:-12px;
transform:translateX(-50%);
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:16px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.pin.purple{background:var(--purple);}
.pin.green{background:var(--green);}

.title{
margin-top:10px;
font-weight:700;
}
.tags{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}
.tags span{
font-size:11px;
padding:4px 8px;
border-radius:999px;
background:#f3eef5;
color:#6f5978;
}
.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:999;
}
.lightbox img{
max-width:92vw;
max-height:92vh;
}
@media(max-width:1200px){.gallery{column-count:4;}}
@media(max-width:900px){.gallery{column-count:3;}}
@media(max-width:700px){.gallery{column-count:2;}}
</style>
</head>
<body>

<header><h1>Archive Room</h1></header>

<div class="filters">
<button class="filter active">ALL</button>
<button class="filter">2026</button>
<button class="filter">EVENT</button>
<button class="filter">設定資料</button>
<button class="filter">らくがき</button>
</div>

<div class="section">

<details open>
<summary>📂 2026</summary>

<div class="gallery">

<div class="card">
<div class="pin purple">📌</div>
<img src="images/illust01_01.webp">
<div class="title">ONLY YOU!</div>
<div class="tags">
<span>#恋愛</span><span>#ギャグ</span><span>#2026</span>
</div>
</div>

<div class="card">
<div class="pin green">📌</div>
<img src="images/illust01_02.webp">
<div class="title">設定資料</div>
<div class="tags">
<span>#資料</span><span>#キャラ</span>
</div>
</div>

<div class="card">
<div class="pin purple">📌</div>
<img src="images/illust01_03.webp">
<div class="title">イベント展示</div>
<div class="tags">
<span>#イベント</span><span>#展示</span>
</div>
</div>

<div class="card">
<div class="pin green">📌</div>
<img src="images/illust01_04.webp">
<div class="title">らくがき</div>
<div class="tags">
<span>#らくがき</span>
</div>
</div>

</div>
</details>

<details>
<summary>📂 2025</summary>
<div class="gallery">
<div class="card">
<div class="pin purple">📌</div>
<img src="images/illust01_05.webp">
<div class="title">Archive</div>
<div class="tags">
<span>#2025</span>
</div>
</div>
</div>
</details>

</div>

<div class="lightbox" id="lightbox">
<img id="viewer">
</div>

<script>
document.querySelectorAll('.card').forEach(card=>{
 card.onclick=()=>{
  document.getElementById('viewer').src=card.querySelector('img').src;
  document.getElementById('lightbox').style.display='flex';
 }
});
document.getElementById('lightbox').onclick=()=>{
 document.getElementById('lightbox').style.display='none';
};
</script>

</body>
</html>
